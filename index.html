<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>nerdbox</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79c0ff;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4rem 1.5rem 3rem;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
    }

    header img {
      width: 160px;
      height: 160px;
      margin-bottom: 1.25rem;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    header p {
      margin-top: 0.5rem;
      color: var(--muted);
      font-size: 1rem;
    }

    nav {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1rem;
      width: 100%;
      max-width: 720px;
      margin-bottom: 3rem;
    }

    nav a {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      padding: 1.25rem 1.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.15s, background 0.15s;
    }

    nav a:hover {
      border-color: var(--accent);
      background: #1c2230;
    }

    nav a .card-title {
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--accent);
    }

    nav a:hover .card-title {
      color: var(--accent-hover);
    }

    nav a .card-desc {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.4;
    }

    footer {
      margin-top: auto;
      padding-top: 2rem;
      color: var(--muted);
      font-size: 0.8rem;
      text-align: center;
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }

    footer a:hover {
      color: var(--accent-hover);
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <header>
    <img src="static/img/nerdbox-white.svg" alt="nerdbox logo" />
    <h1>nerdbox</h1>
    <p>A lightweight VM runtime for container workloads</p>
  </header>

  <nav>
    <a href="dev/bench/">
      <span class="card-title">Benchmarks</span>
      <span class="card-desc">Historical VM start and stop performance over time</span>
    </a>
  </nav>

  <footer>
    <a href="https://github.com/austinvazquez/nerdbox">GitHub</a>
  </footer>
</body>
</html>
